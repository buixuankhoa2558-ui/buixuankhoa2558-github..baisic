
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Cận - cd:Bui</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg-color: #050505; 
            --panel-bg: #151515; 
            --text-color: #f1f5f9;
            --primary: #00e5ff; 
            --correct: #10b981;
            --wrong: #ef4444;
            --skip: #f59e0b;
            --neon-glow: rgba(0, 229, 255, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; overflow: hidden; position: relative;
        }

        /* --- LÁ RƠI TỔNG THỂ --- */
        #falling-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .leaf { position: absolute; top: -50px; opacity: 0.7; filter: drop-shadow(0 0 5px var(--primary)); animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-50px) rotate(0); opacity: 0;} 10% { opacity: 0.7;} 90% { opacity: 0.7;} 100% { transform: translateY(110vh) rotate(360deg); opacity: 0;} }

        /* --- KHUNG TỔNG THỂ --- */
        .container {
            position: relative;
            background-color: var(--panel-bg);
            padding: 40px 30px;
            border-radius: 16px;
            width: 100%; max-width: 900px;
            z-index: 10;
            box-shadow: 0 0 25px var(--neon-glow), inset 0 0 10px rgba(255,255,255,0.05);
            border: 1px solid var(--neon-glow);
            overflow: hidden;
        }

        /* --- VIỀN HOA PHÁT QUANG + CHỮ cd:Bui --- */
        .floral-border {
            position: absolute; font-size: 16px; white-space: nowrap; pointer-events: none;
            letter-spacing: 5px; opacity: 0.8; color: #fff; text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
        }
        .floral-top { top: 5px; left: 0; animation: scrollX 25s linear infinite; }
        .floral-bottom { bottom: 5px; right: 0; animation: scrollX 25s linear infinite reverse; }
        .floral-left { top: 0; left: 5px; writing-mode: vertical-rl; animation: scrollY 25s linear infinite reverse; }
        .floral-right { top: 0; right: 5px; writing-mode: vertical-rl; animation: scrollY 25s linear infinite; }
        @keyframes scrollX { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }
        @keyframes scrollY { 0% { transform: translateY(-50%); } 100% { transform: translateY(0); } }

        /* --- HIỆU ỨNG CHUYỂN CÂU --- */
        .content { position: relative; z-index: 5; text-align: center; animation: fadeInSlide 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes fadeInSlide { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 24px; color: var(--primary); margin-bottom: 20px; text-shadow: 0 0 10px var(--neon-glow); letter-spacing: 2px; text-transform: uppercase; }
        .math-box {
            background: rgba(0,0,0,0.6); padding: 25px; border-radius: 12px; font-size: 28px;
            margin-bottom: 30px; border: 1px solid rgba(0, 229, 255, 0.3); box-shadow: inset 0 0 15px rgba(0,0,0,0.8); display: flex; justify-content: center;
        }

        /* --- KHUNG CÂU HỎI --- */
        .questions-layout { display: flex; gap: 20px; margin-bottom: 30px; justify-content: space-evenly; }
        .question-panel { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; position: relative; }
        .question-panel h3 { color: #ccc; margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid var(--primary); padding-bottom: 5px; text-shadow: 0 0 5px var(--neon-glow); }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; flex: 1; }

        .btn-opt {
            background: rgba(0,0,0,0.4); border: 1px solid #333; color: var(--text-color); position: relative;
            padding: 15px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-opt:hover:not(:disabled) { border-color: var(--primary); box-shadow: 0 0 10px var(--neon-glow); }
        .btn-opt.correct { border-color: var(--correct)!important; background: rgba(16,185,129,0.15)!important; box-shadow: 0 0 15px rgba(16,185,129,0.5)!important; color: var(--correct); }
        .btn-opt.wrong { border-color: var(--wrong)!important; background: rgba(239,68,68,0.1)!important; opacity: 0.6; }

        .controls { display: flex; gap: 20px; justify-content: center; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; transition: 0.3s; letter-spacing: 1px; }
        .btn-skip { background: transparent; border: 1px solid var(--skip); color: var(--skip); }
        .btn-skip:hover { background: rgba(245, 158, 11, 0.1); box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
        .btn-next { background: var(--primary); color: #000; display: none; box-shadow: 0 0 15px var(--neon-glow); }
        .btn-next:hover { background: #fff; box-shadow: 0 0 20px #fff; }

        /* --- BẢNG ĐIỀU KHIỂN TRÁI (Lịch sử & Âm thanh) --- */
        .top-left-controls {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            display: flex; gap: 15px;
        }
        .btn-top {
            background: var(--panel-bg); border: 1px solid var(--primary); color: var(--primary);
            padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 16px;
            box-shadow: 0 0 10px var(--neon-glow); transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-top:hover { background: var(--primary); color: #000; }

        /* --- OVERLAY LỊCH SỬ & ÂM THANH --- */
        .overlay-panel {
            position: fixed; inset: 0; background: rgba(5,5,5,0.95); z-index: 200;
            display: none; flex-direction: column; padding: 40px; overflow-y: auto; backdrop-filter: blur(10px);
        }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--primary); padding-bottom: 15px; }
        .btn-back { background: transparent; border: none; color: var(--primary); font-size: 24px; cursor: pointer; transition: 0.2s; text-shadow: 0 0 10px var(--primary); }
        .btn-back:hover { transform: translateX(-5px); }
        
        .history-list { display: grid; gap: 15px; max-width: 800px; margin: 0 auto; width: 100%; }
        .history-item { background: var(--panel-bg); border: 1px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: space-between;}
        .history-item:hover { border-color: var(--primary); box-shadow: 0 0 10px var(--neon-glow); }

        /* --- CÀI ĐẶT ÂM THANH --- */
        .sound-settings { display: flex; flex-direction: column; align-items: center; gap: 30px; margin-top: 50px; }
        .volume-control { display: flex; align-items: center; gap: 20px; font-size: 20px; width: 100%; max-width: 400px; }
        input[type=range] { flex: 1; accent-color: var(--primary); cursor: pointer; }
        .btn-mute-toggle {
            background: var(--primary); color: #000; padding: 15px 30px; border: none;
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px var(--neon-glow); transition: 0.3s;
        }

        @media (max-width: 768px) {
            .questions-layout { flex-direction: column; }
            .container { padding: 30px 15px; }
            .floral-border { display: none; }
            .top-left-controls { top: 10px; left: 10px; flex-direction: column; gap: 10px; }
            .btn-top { font-size: 14px; padding: 8px 12px; }
        }
    </style>
</head>
<body>

<div class="top-left-controls">
    <button class="btn-top" onclick="toggleHistory()">🕒 Lịch sử</button>
    <button class="btn-top" onclick="toggleSoundPanel()">🎵 Âm thanh</button>
</div>

<div id="falling-layer"></div>

<div class="container" id="main-container">
    <div class="floral-border floral-top">🌸 cd:Bui 🌼 🍃 🌺 🌿 cd:Bui 🌸 🌼 🍃 🌺 🌸 🌿 cd:Bui 🌼 🍃 🌺 🌿 cd:Bui 🌸 🌼 🍃 🌺</div>
    <div class="floral-border floral-bottom">🌸 cd:Bui 🌼 🍃 🌺 🌿 cd:Bui 🌸 🌼 🍃 🌺 🌸 🌿 cd:Bui 🌼 🍃 🌺 🌿 cd:Bui 🌸 🌼 🍃 🌺</div>
    <div class="floral-border floral-left">🌸cd:Bui🌼🍃🌺🌿cd:Bui🌸🌼🍃🌺</div>
    <div class="floral-border floral-right">🌸cd:Bui🌼🍃🌺🌿cd:Bui🌸🌼🍃🌺</div>

    <div class="content" id="game-content">
        <h1>Khảo Sát Tiệm Cận</h1>
        <div class="math-box" id="math-formula"></div>
        <div class="questions-layout" id="questions-area"></div>
        <div class="controls">
            <button class="btn btn-skip" id="btn-skip" onclick="handleSkip()">Bỏ qua / Xem đáp án</button>
            <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">Câu tiếp theo ➔</button>
        </div>
    </div>
</div>

<div id="history-overlay" class="overlay-panel">
    <div class="panel-header">
        <button class="btn-back" onclick="toggleHistory()">🔙 Quay lại</button>
        <h2 style="color: var(--primary); text-shadow: 0 0 10px var(--neon-glow);">Lịch Sử Làm Bài</h2>
        <div style="width: 100px;"></div>
    </div>
    <div class="history-list" id="history-list-container"></div>
</div>

<div id="sound-overlay" class="overlay-panel">
    <div class="panel-header">
        <button class="btn-back" onclick="toggleSoundPanel()">🔙 Trở lại trang chủ</button>
        <h2 style="color: var(--primary); text-shadow: 0 0 10px var(--neon-glow);">Cài Đặt Âm Thanh</h2>
        <div style="width: 150px;"></div>
    </div>
    <div class="sound-settings">
        <div class="volume-control">
            <span>🔉</span>
            <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.5" oninput="changeVolume(this.value)">
            <span>🔊</span>
        </div>
        <button class="btn-mute-toggle" id="btn-mute" onclick="toggleMute()">🔊 Đang Bật Âm</button>
    </div>
</div>

<script>
    // --- QUẢN LÝ AUDIO & FILE NGOÀI ---
    const bgm = new Audio('50838754-sad_guitar-359666.mp3');
    bgm.loop = true;
    const correctSfx = new Audio('cartoon-music-game-sfx-correct-game-show-alert-494539.mp3');
    
    let isMuted = false;
    let masterVolume = 0.5;
    bgm.volume = masterVolume;
    correctSfx.volume = masterVolume;

    // Trình duyệt yêu cầu tương tác mới cho phát nhạc
    let bgmStarted = false;
    document.body.addEventListener('click', () => {
        if(!bgmStarted && !isMuted) {
            bgm.play().catch(e => console.log("BGM chưa thể phát tự động: ", e));
            bgmStarted = true;
        }
    }, {once: true});

    function changeVolume(val) {
        masterVolume = parseFloat(val);
        if(!isMuted) {
            bgm.volume = masterVolume;
            correctSfx.volume = masterVolume;
        }
    }

    function toggleMute() {
        isMuted = !isMuted;
        const btn = document.getElementById('btn-mute');
        if(isMuted) {
            bgm.volume = 0;
            correctSfx.volume = 0;
            btn.innerText = '🔇 Đang Tắt Âm';
            btn.style.background = 'var(--wrong)';
            btn.style.boxShadow = '0 0 15px rgba(239, 68, 68, 0.5)';
        } else {
            bgm.volume = masterVolume;
            correctSfx.volume = masterVolume;
            if(bgmStarted) bgm.play();
            btn.innerText = '🔊 Đang Bật Âm';
            btn.style.background = 'var(--primary)';
            btn.style.boxShadow = '0 0 15px var(--neon-glow)';
        }
    }

    // --- ÂM THANH HỆ THỐNG (Web Audio API cho các nút khác) ---
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let actx;
    function playSysSnd(type){
        if(isMuted || masterVolume === 0) return;
        if(!actx) actx = new AudioCtx();
        if(actx.state === 'suspended') actx.resume();
        
        const osc = actx.createOscillator();
        const gain = actx.createGain();
        osc.connect(gain); gain.connect(actx.destination);
        const now = actx.currentTime;

        const vol = masterVolume * 0.8; // Cân bằng âm lượng

        if(type === 'wrong') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(vol * 0.5, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        } else if(type === 'skip') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(150, now + 0.3);
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(vol * 0.4, now + 0.1); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if(type === 'next' || type === 'ui') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now);
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(vol * 0.4, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if(type === 'done') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(220, now); osc.frequency.setValueAtTime(277.18, now + 0.15); osc.frequency.setValueAtTime(329.63, now + 0.3);
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(vol * 0.4, now + 0.1); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
            osc.start(now); osc.stop(now + 0.6);
        }
    }

    // --- HIỆU ỨNG HOA BUNG TOẢ (PARTICLES BURST) ---
    function burstFlowers(btnElement) {
        const rect = btnElement.getBoundingClientRect();
        const startX = rect.left + rect.width / 2;
        const startY = rect.top + rect.height / 2;
        const emojis = ['🌸', '🌺', '🌼', '✨', '🌿'];
        
        for (let i = 0; i < 12; i++) {
            const flower = document.createElement('div');
            flower.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            flower.style.position = 'fixed';
            flower.style.left = startX + 'px';
            flower.style.top = startY + 'px';
            flower.style.fontSize = (Math.random() * 10 + 12) + 'px';
            flower.style.pointerEvents = 'none';
            flower.style.zIndex = '9999';
            flower.style.transform = 'translate(-50%, -50%)';
            document.body.appendChild(flower);

            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 50 + 30; // Bay xa từ 30 đến 80px
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;

            const anim = flower.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
            ], {
                duration: 600 + Math.random() * 400,
                easing: 'cubic-bezier(0.25, 1, 0.5, 1)'
            });

            anim.onfinish = () => flower.remove();
        }
    }

    // --- LÁ RƠI NHẸ NHÀNG ---
    function createLeaf() {
        const layer = document.getElementById('falling-layer');
        const leaf = document.createElement('div');
        leaf.className = 'leaf';
        const items = ['🌸', '🍃', '✨', '🌿'];
        leaf.innerText = items[Math.floor(Math.random() * items.length)];
        leaf.style.left = Math.random() * 100 + 'vw';
        leaf.style.animationDuration = (Math.random() * 4 + 6) + 's'; 
        leaf.style.fontSize = (Math.random() * 8 + 12) + 'px'; 
        layer.appendChild(leaf);
        setTimeout(() => leaf.remove(), 10000); 
    }
    setInterval(createLeaf, 1200);

    // --- LOGIC TOÁN HỌC & UI ---
    let currentData = null;
    let historyDB = []; 
    
    const nz = (min,max) => { let v=0; while(v===0)v=Math.floor(Math.random()*(max-min+1))+min; return v; };
    const fmt = (c,d,f) => { if(c===0)return''; let s=c>0?(f?'':'+'):'-',a=Math.abs(c),cs=(a===1&&d>0)?'':a,vs=d===2?'x^2':(d===1?'x':''); return `${s}${cs}${vs}`; };

    function genData() {
        const type = Math.random() > 0.5 ? 1 : 2; 
        let tex = "", questions = [];
        let id = Date.now(); 

        if(type === 1) {
            let a=nz(-5,5), b=nz(-9,9), d=nz(-5,5); if(a*d-b===0)b++;
            tex=`\\( y = \\frac{${fmt(a,1,true)}${fmt(b,0,false)}}{x${fmt(d,0,false)}} \\)`;
            let tcD = `x = ${-d}`, tcN = `y = ${a}`;
            let disD = [`x = ${d}`, `y = ${-d}`, `x = ${-d+1}`].filter(x=>x!==tcD).slice(0,3);
            let disN = [`y = ${-a}`, `x = ${a}`, `y = ${d}`].filter(x=>x!==tcN).slice(0,3);
            questions.push({ title: "Tiệm Cận Đứng", correct: tcD, options: [tcD, ...disD].sort(()=>Math.random()-0.5), isAnswered: false });
            questions.push({ title: "Tiệm Cận Ngang", correct: tcN, options: [tcN, ...disN].sort(()=>Math.random()-0.5), isAnswered: false });
        } else {
            let a=nz(-2,2), b=nz(-4,4), c=nz(-4,4), e=nz(-4,4); if(a*e*e-b*e+c===0)c++;
            tex=`\\( y = \\frac{${fmt(a,2,true)}${fmt(b,1,false)}${fmt(c,0,false)}}{x${fmt(e,0,false)}} \\)`;
            let tcD = `x = ${-e}`;
            let disD = [`x = ${e}`, `y = ${-e}`, `x = ${-e+1}`].filter(x=>x!==tcD).slice(0,3);
            let m=a, n=b-a*e; let ys = `y = ${fmt(m,1,true)}${fmt(n,0,false)}`; if(ys==="y = ")ys="y = 0";
            let disX = [`y = ${fmt(m,1,true)}${fmt(b+a*e,0,false)}`, `y = ${fmt(-m,1,true)}${fmt(n,0,false)}`, `y = ${fmt(m,1,true)}${fmt(-n,0,false)}`].map(x => x==="y = " ? "y = 0" : x).filter(x=>x!==ys).slice(0,3);
            questions.push({ title: "Tiệm Cận Đứng", correct: tcD, options: [tcD, ...disD].sort(()=>Math.random()-0.5), isAnswered: false });
            questions.push({ title: "Tiệm Cận Xiên", correct: ys, options: [ys, ...disX].sort(()=>Math.random()-0.5), isAnswered: false });
        }
        return { id, tex, questions };
    }

    function renderQuestion(data, isReview = false) {
        currentData = data;
        
        const contentDiv = document.getElementById('game-content');
        contentDiv.style.animation = 'none'; contentDiv.offsetHeight;
        contentDiv.style.animation = 'fadeInSlide 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)';

        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-skip').style.display = 'block';
        document.getElementById('math-formula').innerHTML = data.tex;
        
        const area = document.getElementById('questions-area');
        area.innerHTML = '';

        data.questions.forEach((q, index) => {
            const panel = document.createElement('div');
            panel.className = 'question-panel';
            panel.innerHTML = `<h3>${q.title}</h3>`;
            
            const grid = document.createElement('div');
            grid.className = 'options-grid';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-opt';
                btn.innerHTML = `\\( ${opt} \\)`;
                btn.onclick = () => handleAnswer(btn, index, opt);
                grid.appendChild(btn);
            });

            panel.appendChild(grid);
            area.appendChild(panel);
        });

        if(isReview) currentData.questions.forEach(q => q.isAnswered = false);
        else historyDB.unshift(JSON.parse(JSON.stringify(currentData)));

        if(window.MathJax) MathJax.typesetPromise();
    }

    function handleAnswer(btn, panelIndex, selectedStr) {
        let q = currentData.questions[panelIndex];
        if (q.isAnswered) return; 
        
        const panelBtns = btn.parentElement.querySelectorAll('.btn-opt');

        if (selectedStr === q.correct) {
            // PHÁT FILE MP3 CHO ĐÁP ÁN ĐÚNG
            if(!isMuted) {
                correctSfx.currentTime = 0; 
                correctSfx.play().catch(e => console.log(e));
            }
            btn.classList.add('correct');
            burstFlowers(btn); // GỌI HIỆU ỨNG HOA BUNG TỎA
        } else {
            playSysSnd('wrong');
            btn.classList.add('wrong');
            panelBtns.forEach(b => {
                if (b.innerHTML.includes(q.correct)) b.classList.add('correct');
            });
        }
        
        panelBtns.forEach(b => b.disabled = true);
        q.isAnswered = true;
        checkAllDone();
    }

    function handleSkip() {
        playSysSnd('skip');
        const area = document.getElementById('questions-area');
        currentData.questions.forEach((q, i) => {
            if(!q.isAnswered) {
                const btns = area.children[i].querySelectorAll('.btn-opt');
                btns.forEach(b => {
                    if (b.innerHTML.includes(q.correct)) b.classList.add('correct');
                    b.disabled = true;
                });
                q.isAnswered = true;
            }
        });
        checkAllDone(true);
    }

    function checkAllDone(isSkip = false) {
        const allDone = currentData.questions.every(q => q.isAnswered);
        if (allDone) {
            if(!isSkip) setTimeout(() => playSysSnd('done'), 400); // Đợi tiếng correct kêu xong mới kêu tiếng done
            document.getElementById('btn-next').style.display = 'block';
            document.getElementById('btn-skip').style.display = 'none';
        }
    }

    function nextQuestion() {
        playSysSnd('next');
        renderQuestion(genData());
    }

    // --- ĐIỀU KHIỂN PANEL ÂM THANH & LỊCH SỬ ---
    function toggleHistory() {
        playSysSnd('ui');
        const overlay = document.getElementById('history-overlay');
        if(overlay.style.display === 'flex') overlay.style.display = 'none';
        else {
            document.getElementById('sound-overlay').style.display = 'none';
            overlay.style.display = 'flex';
            renderHistoryList();
        }
    }

    function toggleSoundPanel() {
        playSysSnd('ui');
        const overlay = document.getElementById('sound-overlay');
        if(overlay.style.display === 'flex') overlay.style.display = 'none';
        else {
            document.getElementById('history-overlay').style.display = 'none';
            overlay.style.display = 'flex';
        }
    }

    function renderHistoryList() {
        const list = document.getElementById('history-list-container');
        list.innerHTML = '';
        if(historyDB.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#888;">Bạn chưa làm bài nào.</p>';
            return;
        }

        historyDB.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div style="font-size: 20px;">Bài ${historyDB.length - index}: ${item.tex}</div>
                <button class="btn" style="background: var(--primary); color: #000; padding: 8px 15px;">Làm Lại</button>
            `;
            div.onclick = () => {
                toggleHistory();
                renderQuestion(JSON.parse(JSON.stringify(item)), true);
            };
            list.appendChild(div);
        });
        if(window.MathJax) MathJax.typesetPromise();
    }

    window.onload = () => { renderQuestion(genData()); };
</script>
</body>
</html>
